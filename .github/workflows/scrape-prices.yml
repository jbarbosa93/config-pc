name: Nightly Price Scraper

on:
  schedule:
    # Every night at 02:00 UTC (03:00 or 04:00 Swiss time)
    - cron: '0 2 * * *'
  # Allow manual trigger from GitHub Actions UI
  workflow_dispatch:
    inputs:
      dry_run:
        description: 'Dry run (do not write to DB)'
        type: boolean
        default: false
      limit:
        description: 'Max components to process (0 = all)'
        type: number
        default: 0
      type_filter:
        description: 'Only process this component type (e.g. GPU, CPU)'
        type: string
        default: ''
      debug:
        description: 'Debug mode — dump search page HTML for diagnosis'
        type: boolean
        default: false

jobs:
  scrape:
    name: Fetch prices from Digitec.ch
    runs-on: ubuntu-latest
    timeout-minutes: 60

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Run price scraper
        env:
          NEXT_PUBLIC_SUPABASE_URL: ${{ secrets.NEXT_PUBLIC_SUPABASE_URL }}
          SUPABASE_SERVICE_ROLE_KEY: ${{ secrets.SUPABASE_SERVICE_ROLE_KEY }}
        run: |
          ARGS=""
          if [ "${{ inputs.dry_run }}" = "true" ]; then ARGS="$ARGS --dry-run"; fi
          if [ -n "${{ inputs.limit }}" ] && [ "${{ inputs.limit }}" != "0" ]; then ARGS="$ARGS --limit=${{ inputs.limit }}"; fi
          if [ -n "${{ inputs.type_filter }}" ]; then ARGS="$ARGS --type=${{ inputs.type_filter }}"; fi
          if [ "${{ inputs.debug }}" = "true" ]; then ARGS="$ARGS --debug"; fi
          npx tsx scripts/scrape-prices.ts $ARGS

      - name: Upload results on failure
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: scrape-error-logs
          path: |
            /tmp/scrape-*.log
          retention-days: 7
