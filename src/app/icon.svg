<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 32 32" fill="none">
  <!-- Background -->
  <rect width="32" height="32" rx="7" fill="#0F172A"/>
  <!-- CPU body -->
  <rect x="9" y="9" width="14" height="14" rx="2" fill="#1E3A5F" stroke="#4f8ef7" stroke-width="1"/>
  <!-- CPU inner die -->
  <rect x="12" y="12" width="8" height="8" rx="1" fill="#2563EB" opacity="0.6"/>
  <rect x="13.5" y="13.5" width="5" height="5" rx="0.5" fill="#4f8ef7" opacity="0.8"/>
  <!-- Top pins -->
  <line x1="12" y1="9" x2="12" y2="6" stroke="#4f8ef7" stroke-width="1.2" stroke-linecap="round"/>
  <line x1="16" y1="9" x2="16" y2="6" stroke="#4f8ef7" stroke-width="1.2" stroke-linecap="round"/>
  <line x1="20" y1="9" x2="20" y2="6" stroke="#4f8ef7" stroke-width="1.2" stroke-linecap="round"/>
  <!-- Bottom pins -->
  <line x1="12" y1="23" x2="12" y2="26" stroke="#4f8ef7" stroke-width="1.2" stroke-linecap="round"/>
  <line x1="16" y1="23" x2="16" y2="26" stroke="#4f8ef7" stroke-width="1.2" stroke-linecap="round"/>
  <line x1="20" y1="23" x2="20" y2="26" stroke="#4f8ef7" stroke-width="1.2" stroke-linecap="round"/>
  <!-- Left pins -->
  <line x1="9" y1="12" x2="6" y2="12" stroke="#4f8ef7" stroke-width="1.2" stroke-linecap="round"/>
  <line x1="9" y1="16" x2="6" y2="16" stroke="#4f8ef7" stroke-width="1.2" stroke-linecap="round"/>
  <line x1="9" y1="20" x2="6" y2="20" stroke="#4f8ef7" stroke-width="1.2" stroke-linecap="round"/>
  <!-- Right pins -->
  <line x1="23" y1="12" x2="26" y2="12" stroke="#4f8ef7" stroke-width="1.2" stroke-linecap="round"/>
  <line x1="23" y1="16" x2="26" y2="16" stroke="#4f8ef7" stroke-width="1.2" stroke-linecap="round"/>
  <line x1="23" y1="20" x2="26" y2="20" stroke="#4f8ef7" stroke-width="1.2" stroke-linecap="round"/>
</svg>
